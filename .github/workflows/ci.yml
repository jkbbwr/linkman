name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workdir: api
          
      - name: Check
        run: cargo check
        working-directory: api
        
      - name: Test
        run: cargo test
        working-directory: api
        env:
          # Use dummy env vars for CI tests that don't need a real DB/OpenAI
          DATABASE_URL: postgres://postgres:password@localhost/linkman
          OPENAI_API_KEY: sk-dummy
          OPENAI_API_BASE: https://api.openai.com/v1
          LLM_MODEL: gpt-4o

  frontend:
    name: Frontend (Extension)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install
        working-directory: extension
        
      - name: Test
        run: bun test
        working-directory: extension
        
      - name: Build
        run: bun run build
        working-directory: extension
        
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/
