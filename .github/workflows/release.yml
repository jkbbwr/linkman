name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            latest
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      # 1. Build Backend Binary
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workdir: api
          
      - name: Build Backend
        run: cargo build --release
        working-directory: api
        
      # 2. Build Frontend Extension
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        
      - name: Build Extension
        run: |
          bun install
          bun run build
        working-directory: extension
        
      - name: Zip Extension
        run: |
          mkdir -p dist-zip
          cp -r extension/dist/* dist-zip/
          cd dist-zip && zip -r ../linkman-extension-${{ github.ref_name }}.zip .
          
      # 3. Create Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            api/target/release/api
            linkman-extension-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
